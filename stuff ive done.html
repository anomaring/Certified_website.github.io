<!DOCTYPE html>
<html>
<head>
    <title>Stuff I've Done - Certified_Balls</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-y: auto;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            position: relative;
            background: #0a0518;
            min-height: 100vh;
        }

        /* Rich purple background - simplified */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #2d1b4e, #120b24 80%);
            z-index: -2;
        }

        .bg-blob {
            position: fixed;
            width: 80vmax; /* Reduced from 100vmax */
            height: 80vmax; /* Reduced from 100vmax */
            border-radius: 50%;
            filter: blur(60px); /* Reduced from 120px */
            z-index: -1;
            mix-blend-mode: soft-light;
            animation: drift 40s infinite alternate; /* Slower animation */
        }

        .blob-purple { background: rgba(156, 80, 255, 0.2); top: -30%; left: -20%; animation-duration: 28s; }
        .blob-magenta { background: rgba(220, 70, 200, 0.15); bottom: -40%; right: -20%; animation-duration: 32s; animation-direction: alternate-reverse; }
        .blob-indigo { background: rgba(110, 60, 230, 0.18); top: 40%; right: 30%; width: 80vmax; animation-duration: 25s; }
        .blob-lavender { background: rgba(190, 140, 255, 0.12); bottom: 20%; left: 20%; width: 70vmax; animation-duration: 30s; animation-direction: alternate-reverse; }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 8%) scale(1.15); }
        }

        /* subtle background shift */
        @keyframes bgShift {
            0% { filter: hue-rotate(0deg) brightness(1); }
            50% { filter: hue-rotate(3deg) brightness(1.02); }
            100% { filter: hue-rotate(0deg) brightness(1); }
        }

        .bg-gradient {
            animation: bgShift 15s infinite alternate;
        }

        /* glass cursor - matching main site */
        #custom-cursor {
            position: fixed;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(200, 160, 255, 0.2);
            backdrop-filter: blur(12px) saturate(200%);
            -webkit-backdrop-filter: blur(12px) saturate(200%);
            border: 1.5px solid rgba(240, 210, 255, 0.5);
            box-shadow: 0 0 40px rgba(180, 130, 255, 0.7),
                        0 0 20px rgba(255, 255, 255, 0.5) inset,
                        6px 6px 12px rgba(0, 0, 0, 0.2),
                        -4px -4px 12px rgba(255, 255, 255, 0.1) inset;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            will-change: transform, left, top;
            transition: width 0.1s, height 0.1s;
        }

        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            filter: blur(4px);
        }

        /* main content container */
        .content-wrapper {
            max-width: 800px;
            margin: 80px auto;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        /* glass card for content */
        .glass-card {
            background: rgba(170, 120, 255, 0.1);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(200, 160, 255, 0.2);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(180, 130, 255, 0.1) inset,
                        0 0 40px rgba(170, 120, 255, 0.2);
            color: #f8f0ff;
        }

        /* back button - glass style */
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(170, 120, 255, 0.15);
            backdrop-filter: blur(10px) saturate(180%);
            -webkit-backdrop-filter: blur(10px) saturate(180%);
            border: 1px solid rgba(200, 160, 255, 0.3);
            color: #f8f0ff;
            padding: 12px 30px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            letter-spacing: 1px;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(180, 130, 255, 0.2) inset,
                        0 0 30px rgba(170, 120, 255, 0.2);
            transition: all 0.25s ease;
            z-index: 1000;
            cursor: none;
        }

        .back-btn:hover {
            background: rgba(190, 140, 255, 0.25);
            border-color: rgba(220, 180, 255, 0.4);
            color: white;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(200, 150, 255, 0.3) inset,
                        0 0 50px rgba(200, 150, 255, 0.3);
            transform: translateY(-2px);
        }
        /* Menu styles */
        .menu-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 70;
        }

        .menu-button {
            position: relative;
            width: 40px;
            height: 40px;
            cursor: none;
            pointer-events: auto;
        }

        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(170, 120, 255, 0.2);
            backdrop-filter: blur(4px) saturate(150%);
            -webkit-backdrop-filter: blur(4px) saturate(150%);
            border: 1px solid rgba(200, 160, 255, 0.3);
            box-shadow: 0 0 10px rgba(170, 120, 255, 0.2);
        }

        .dot:nth-child(1) { top: 8px; left: 50%; transform: translateX(-50%); }
        .dot:nth-child(2) { top: 17px; left: 50%; transform: translateX(-50%); }
        .dot:nth-child(3) { top: 26px; left: 50%; transform: translateX(-50%); }

        .menu-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: rgba(170, 120, 255, 0.15);
            backdrop-filter: blur(8px) saturate(150%);
            -webkit-backdrop-filter: blur(8px) saturate(150%);
            border: 1px solid rgba(200, 160, 255, 0.3);
            border-radius: 10px;
            padding: 10px;
            display: none;
            min-width: 150px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #f8f0ff;
            font-size: 14px;
            font-weight: 500;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(200, 160, 255, 0.2);
            transition: 0.4s;
            border-radius: 20px;
            border: 1px solid rgba(200, 160, 255, 0.3);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background: rgba(255, 255, 255, 0.8);
            transition: 0.4s;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        input:checked + .slider {
            background: rgba(156, 80, 255, 0.4);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }
        /* page title */
        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            text-shadow: 0 0 30px #c49bff, 0 0 60px #9f6eff;
            font-family: 'Poppins', 'Montserrat', sans-serif;
            color: #f8f0ff;
            text-align: center;
        }

        /* list styling */
        .accomplishments-list {
            list-style: none;
            padding: 0;
        }

        .accomplishments-list li {
            margin: 25px 0;
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(200, 160, 255, 0.15);
            border-radius: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .accomplishments-list li:hover {
            background: rgba(190, 140, 255, 0.1);
            border-color: rgba(220, 180, 255, 0.3);
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), 0 0 30px rgba(170, 120, 255, 0.2);
        }

        /* accent color for bullet or icon */
        .accomplishments-list li::before {
            content: '✦';
            color: #c49bff;
            font-size: 1.3rem;
            margin-right: 15px;
            display: inline-block;
            filter: drop-shadow(0 0 5px #c49bff);
        }

        /* subtle footer */
        .footer-note {
            text-align: center;
            margin-top: 40px;
            color: rgba(220, 200, 255, 0.4);
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
        }

        /* mobile adjustments */
        @media (max-width: 600px) {
            .content-wrapper { padding: 20px; margin: 60px auto; }
            .glass-card { padding: 30px; }
            h1 { font-size: 2.2rem; }
            .back-btn { top: 20px; left: 20px; padding: 8px 20px; }
            #custom-cursor { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-blob blob-purple"></div>
    <div class="bg-blob blob-magenta"></div>
    <div class="bg-blob blob-indigo"></div>
    <div class="bg-blob blob-lavender"></div>

    <!-- glass cursor -->
    <div id="custom-cursor"></div>

    <!-- back button -->
    <a href="Certified_website.html" class="back-btn" id="back-btn">← Back to Home</a>

    <!-- main content -->
    <div class="content-wrapper">
        <div class="glass-card">
            <h1>✦ stuff i've done ✦</h1>

            <ul class="accomplishments-list">
                <li>learnt how to design liquid glass</li>
                <li>Made this website</li>
                
            </ul>

            <div class="footer-note">more to accomplish...</div>
        </div>
    </div>

    <!-- Menu button and dropdown -->
    <div class="menu-container">
        <div class="menu-button" id="menu-button">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="menu-dropdown" id="menu-dropdown">
            <div class="menu-item">
                <span>Optimize</span>
                <label class="switch">
                    <input type="checkbox" id="optimize-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // cursor element
            const cursor = document.getElementById('custom-cursor');

            // mouse position
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let lastMouseX = mouseX;
            let lastMouseY = mouseY;

            // track mouse movement - WOBBLE EFFECT
            document.addEventListener('mousemove', (e) => {
                lastMouseX = mouseX;
                lastMouseY = mouseY;
                mouseX = e.clientX;
                mouseY = e.clientY;

                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';

                // wobble effect
                const speedX = mouseX - lastMouseX;
                const speedY = mouseY - lastMouseY;
                const speed = Math.hypot(speedX, speedY);

                if (speed > 2) {
                    const angle = Math.atan2(speedY, speedX);
                    const stretchX = 1 + Math.min(speed * 0.02, 0.4);
                    const stretchY = 1 - Math.min(speed * 0.01, 0.2);

                    cursor.style.transform = `translate(-50%, -50%) rotate(${angle}rad) scale(${stretchX}, ${stretchY})`;
                    cursor.style.borderRadius = '40% 60% 50% 50% / 50% 40% 60% 50%';

                    if (cursor.wobbleTimeout) clearTimeout(cursor.wobbleTimeout);
                    cursor.wobbleTimeout = setTimeout(() => {
                        cursor.style.transform = 'translate(-50%, -50%) scale(1) rotate(0deg)';
                        cursor.style.borderRadius = '50%';
                    }, 120);
                }
            });

            document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
            document.addEventListener('mouseenter', () => cursor.style.opacity = '1');

            // back button hover effect
            const backBtn = document.getElementById('back-btn');
            if (backBtn) {
                backBtn.addEventListener('mouseenter', () => {
                    cursor.style.width = '42px';
                    cursor.style.height = '42px';
                    cursor.style.background = 'rgba(220, 180, 255, 0.3)';
                });

                backBtn.addEventListener('mouseleave', () => {
                    cursor.style.width = '34px';
                    cursor.style.height = '34px';
                    cursor.style.background = 'rgba(200, 160, 255, 0.2)';
                });
            }

            // Menu functionality
            const menuButton = document.getElementById('menu-button');
            const menuDropdown = document.getElementById('menu-dropdown');
            const optimizeToggle = document.getElementById('optimize-toggle');

            menuButton.addEventListener('click', () => {
                menuDropdown.style.display = menuDropdown.style.display === 'block' ? 'none' : 'block';
            });

            optimizeToggle.addEventListener('change', (e) => {
                const isOn = e.target.checked;
                const cursor = document.getElementById('custom-cursor');
                if (cursor) cursor.style.display = isOn ? 'none' : 'block';
                document.body.style.cursor = isOn ? 'default' : 'none';
            });
        })();
    </script>
</body>
</html>
