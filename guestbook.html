<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>guestbook | OEA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0;
            font-family: 'Courier New', 'SF Mono', monospace;
            min-height: 100vh;
            color: #0a4a2a;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 40px;
            color: #0a4a2a;
            text-decoration: none;
            font-size: 0.85rem;
            border-bottom: 1px solid #0a4a2a;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: normal;
            color: #0a4a2a;
            margin-bottom: 2rem;
            border-left: 2px solid #0a4a2a;
            padding-left: 16px;
        }

        .form-card {
            background: white;
            border: 1px solid #ccc;
            padding: 24px;
            margin-bottom: 40px;
        }

        input, textarea {
            width: 100%;
            background: white;
            border: 1px solid #aaa;
            padding: 10px 12px;
            margin-bottom: 16px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #0a4a2a;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #0a4a2a;
        }

        button {
            background: #0a4a2a;
            color: white;
            border: none;
            padding: 8px 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            cursor: pointer;
        }

        button:hover:not(:disabled) {
            background: #0c5c34;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            color: #a00;
            font-size: 0.75rem;
            margin-top: -10px;
            margin-bottom: 12px;
            display: none;
        }

        .messages {
            background: white;
            border: 1px solid #ccc;
            padding: 24px;
        }

        .messages h2 {
            font-size: 0.9rem;
            font-weight: normal;
            color: #0a4a2a;
            margin-bottom: 1rem;
            border-left: 2px solid #0a4a2a;
            padding-left: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .log-entry {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            padding: 6px 0;
            border-bottom: 1px solid #e0e0e0;
            color: #0a4a2a;
        }

        .log-entry strong {
            color: #0a4a2a;
            font-weight: normal;
        }

        .empty-log {
            color: #888;
            font-size: 0.8rem;
            padding: 12px 0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        @media (max-width: 600px) {
            .container { padding: 40px 20px; }
            .form-card, .messages { padding: 16px; }
            input, textarea { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="about.html" class="back-link">← back</a>
        
        <h1>guestbook</h1>
        
        <div class="form-card">
            <input type="text" id="guestName" placeholder="name" maxlength="40">
            <textarea id="guestMsg" rows="2" placeholder="message" maxlength="300"></textarea>
            <div id="formError" class="error"></div>
            <button id="sendBtn">record</button>
        </div>
        
        <div class="messages">
            <h2>log</h2>
            <div id="logContainer"><div class="loading">loading messages...</div></div>
        </div>
    </div>

    <script>
        // token config
     
        const GITHUB_TOKEN = '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';
        const GITHUB_USER = 'anomaring';
        const REPO_NAME = 'guestbook-data';
        
        
        
        const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/issues`;
        
        let lastPost = 0;
        const COOLDOWN = 20000;
        
        async function loadMessages() {
            const container = document.getElementById('logContainer');
            container.innerHTML = '<div class="loading">loading messages...</div>';
            
            try {
                const response = await fetch(API_URL + '?state=open&per_page=50&sort=created&direction=desc', {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load');
                
                const issues = await response.json();
                
                if (issues.length === 0) {
                    container.innerHTML = '<div class="empty-log">— empty —</div>';
                    return;
                }
                
                container.innerHTML = '';
                issues.forEach(issue => {
                    // parse title: "Name | date"
                    let name = 'anon';
                    let date = '';
                    let titleParts = issue.title.split(' | ');
                    if (titleParts.length >= 2) {
                        name = titleParts[0];
                        date = titleParts[1];
                    } else {
                        date = new Date(issue.created_at).toLocaleString();
                    }
                    
                    let div = document.createElement('div');
                    div.className = 'log-entry';
                    div.innerHTML = `<strong>${escapeHtml(date)} — ${escapeHtml(name)}</strong><br>${escapeHtml(issue.body || '')}`;
                    container.appendChild(div);
                });
                
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="empty-log">failed to load messages</div>';
            }
        }
        
        async function postMessage(name, text) {
            const dateStr = new Date().toLocaleString();
            const title = `${name || 'anon'} | ${dateStr}`;
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    title: title,
                    body: text,
                    labels: ['guestbook']
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'failed to post');
            }
            
            return true;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }
        
        function showError(msg) {
            const errDiv = document.getElementById('formError');
            errDiv.textContent = msg;
            errDiv.style.display = 'block';
            setTimeout(() => errDiv.style.display = 'none', 3000);
        }
        
        const sendBtn = document.getElementById('sendBtn');
        const nameInput = document.getElementById('guestName');
        const msgInput = document.getElementById('guestMsg');
        
        sendBtn.addEventListener('click', async () => {
            const name = nameInput.value.trim();
            const msg = msgInput.value.trim();
            
            if (!msg) {
                showError('message cannot be empty');
                return;
            }
            if (msg.length > 300) {
                showError('message too long (max 300 chars)');
                return;
            }
            
            const now = Date.now();
            if (now - lastPost < COOLDOWN) {
                const wait = Math.ceil((COOLDOWN - (now - lastPost)) / 1000);
                showError(`wait ${wait} seconds`);
                return;
            }
            
            sendBtn.disabled = true;
            sendBtn.textContent = 'sending...';
            
            try {
                await postMessage(name, msg);
                nameInput.value = '';
                msgInput.value = '';
                lastPost = now;
                await loadMessages();
            } catch (err) {
                console.error(err);
                showError(err.message || 'failed to post');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'record';
            }
        });
        
        loadMessages();
    </script>
</body>
</html>
