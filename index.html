    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            position: relative;
            background: #0a0518;
        }

        /* Rich purple background */
        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #2d1b4e, #120b24 80%);
            z-index: -2;
        }

        .bg-blob {
            position: absolute;
            width: 80vmax; /* Reduced from 100vmax */
            height: 80vmax; /* Reduced from 100vmax */
            border-radius: 50%;
            filter: blur(60px); /* Reduced from 120px */
            z-index: -1;
            mix-blend-mode: soft-light;
            animation: drift 40s infinite alternate; /* Slower animation */
        }

        .blob-purple { background: rgba(156, 80, 255, 0.2); top: -30%; left: -20%; animation: drift 28s infinite alternate; }
        .blob-magenta { background: rgba(220, 70, 200, 0.15); bottom: -40%; right: -20%; animation: drift 32s infinite alternate-reverse; }
        .blob-indigo { background: rgba(110, 60, 230, 0.18); top: 40%; right: 30%; width: 80vmax; animation: drift 25s infinite alternate; }
        .blob-lavender { background: rgba(190, 140, 255, 0.12); bottom: 20%; left: 20%; width: 70vmax; animation: drift 30s infinite alternate-reverse; }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 8%) scale(1.15); }
        }

        /* Canvas for connection lines */
        #connection-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000;
            will-change: transform;
        }

        /* Bubbles container */
        #bubbles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* BUBBLE */
        /* BUBBLE - PERFORMANCE OPTIMIZED */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(200, 160, 255, 0.06);
            backdrop-filter: blur(4px) saturate(150%); /* Reduced blur and saturate */
            -webkit-backdrop-filter: blur(4px) saturate(150%);
            border: 1px solid rgba(220, 180, 255, 0.2);
            box-shadow: 0 0 20px rgba(170, 120, 255, 0.15), /* Reduced shadows */
                        0 0 10px rgba(255, 255, 255, 0.08) inset,
                        -5px -5px 12px rgba(0, 0, 0, 0.08) inset,
                        5px 5px 12px rgba(255, 255, 255, 0.03) inset;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            will-change: transform, left, top;
            transition: transform 0.3s ease, box-shadow 0.15s; /* Added smooth transform transition */
            cursor: none;
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000;
        }

        .bubble:hover {
            box-shadow: 0 0 60px rgba(200, 150, 255, 0.4),
                        0 0 25px rgba(255, 255, 255, 0.2) inset,
                        -12px -12px 30px rgba(0, 0, 0, 0.2) inset;
        }

        .bubble::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 240, 255, 0.4) 0%, transparent 80%);
            filter: blur(4px);
        }

        /* bubble cursorrsa */
        #custom-cursor {
            position: fixed;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(200, 160, 255, 0.2);
            backdrop-filter: blur(12px) saturate(200%);
            -webkit-backdrop-filter: blur(12px) saturate(200%);
            border: 1.5px solid rgba(240, 210, 255, 0.5);

                        6px 6px 12px rgba(0, 0, 0, 0.2),
                        -4px -4px 12px rgba(255, 255, 255, 0.1) inset;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            will-change: transform, left, top;
            transition: width 0.1s, height 0.1s, background 0.2s;
        }

        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);

        .btn::before {

        .slider {

        }

        .slider:before {

            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;

        /* Particle effects */
        .particle {

        /* Mouse trail */

<script>
        (function() {
            // Canvas for connection lines
            const canvas = document.getElementById('connection-canvas');
            const ctx = canvas.getContext('2d');
            
            // Cursor elements
            const cursor = document.getElementById('custom-cursor');
            const container = document.getElementById('bubbles-container'); 
            
            // Mouse position
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let lastMouseX = mouseX;
            let lastMouseY = mouseY;
            
            // Bubbles array
            let bubbles = [];
            
            // Background stars array
            let stars = [];
            
            // Helper to check mobile
            function isMobile() {
                return window.innerWidth <= 600;
            }
            
            // Particle explosion function
            function createParticleExplosion(x, y, size) {
                const particleCount = Math.min(size / 3, 20);
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.width = (2 + Math.random() * 4) + 'px';
                    particle.style.height = particle.style.width;
                    
                    const angle = (Math.PI * 2 / particleCount) * i;
                    const speed = 2 + Math.random() * 3;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    
                    const color = `rgba(${160 + Math.random() * 95}, ${120 + Math.random() * 80}, 255, 0.8)`;
                    particle.style.background = color;
                    particle.style.boxShadow = `0 0 ${3 + Math.random() * 3}px ${color}`;
                    
                    document.body.appendChild(particle);
                    
                    let pX = x, pY = y, pVX = vx, pVY = vy, life = 1;
                    const startTime = Date.now();
                    
                    function animateParticle() {
                        const elapsed = Date.now() - startTime;
                        life = Math.max(0, 1 - elapsed / 800);
                        
                        pVX *= 0.97;
                        pVY *= 0.97;
                        pVY += 0.05;
                        pX += pVX;
                        pY += pVY;
                        
                        particle.style.left = pX + 'px';
                        particle.style.top = pY + 'px';
                        particle.style.opacity = life;
                        
                        if (life > 0) {
                            requestAnimationFrame(animateParticle);
                        } else {
                            particle.remove();
                        }
                    }
                    animateParticle();
                }
            }
            
            // Create mouse trail dots
            function createTrailDot(x, y) {
                // Don't create trails on mobile
                if (isMobile()) return;
                
                const trail = document.createElement('div');
                trail.className = 'trail-dot';
                trail.style.left = (x - 3) + 'px';
                trail.style.top = (y - 3) + 'px';
                trail.style.width = '6px';
                trail.style.height = '6px';
                trail.style.background = `rgba(${150 + Math.random() * 105}, ${110 + Math.random() * 70}, 255, 0.6)`;
                trail.style.boxShadow = `0 0 ${3 + Math.random() * 5}px rgba(200, 160, 255, 0.5)`;
                document.body.appendChild(trail);
                
                let opacity = 0.6;
                const fadeInterval = setInterval(() => {
                    opacity -= 0.08;
                    trail.style.opacity = opacity;
                    if (opacity <= 0) {
                        clearInterval(fadeInterval);
                        trail.remove();
                    }
                }, 20);
            }
            
            // Update glow for buttons based on cursor proximity
            function updateButtonGlow(x, y) {
                const buttons = document.querySelectorAll('.btn, .social-btn');
                buttons.forEach(btn => {
                    const rect = btn.getBoundingClientRect();
                    const btnX = rect.left + rect.width / 2;
                    const btnY = rect.top + rect.height / 2;
                    const distance = Math.hypot(x - btnX, y - btnY);
                    const maxDistance = 200;
                    
                    if (distance < maxDistance) {
                        const intensity = 1 - (distance / maxDistance);
                        const glowAmount = intensity * 40;
                        btn.style.boxShadow = `0 0 ${15 + glowAmount}px rgba(200, 150, 255, ${0.3 + intensity * 0.5}),
                                             0 0 ${30 + glowAmount * 1.5}px rgba(156, 80, 255, ${0.2 + intensity * 0.3})`;
                    } else {
                        btn.style.boxShadow = '';
                    }
                });
            }
            
            // Track mouse movement for cursor wobble, trail, and glow
            let lastTrailTime = 0;
            document.addEventListener('mousemove', (e) => {
                lastMouseX = mouseX;
                lastMouseY = mouseY;
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';
                
                // Create mouse trail
                const now = Date.now();
                if (now - lastTrailTime > 30) {
                    createTrailDot(mouseX, mouseY);
                    lastTrailTime = now;
                }
                
                // Update glow for buttons
                updateButtonGlow(mouseX, mouseY);
                
                // Wobble effect
                const speedX = mouseX - lastMouseX;
                const speedY = mouseY - lastMouseY;
                const speed = Math.hypot(speedX, speedY);
                
                if (speed > 2) {
                    const angle = Math.atan2(speedY, speedX);
                    const stretchX = 1 + Math.min(speed * 0.02, 0.4);
                    const stretchY = 1 - Math.min(speed * 0.01, 0.2);
                    
                    cursor.style.transform = `translate(-50%, -50%) rotate(${angle}rad) scale(${stretchX}, ${stretchY})`;
                    cursor.style.borderRadius = '40% 60% 50% 50% / 50% 40% 60% 50%';
                    
                    if (cursor.wobbleTimeout) clearTimeout(cursor.wobbleTimeout);
                    cursor.wobbleTimeout = setTimeout(() => {
                        cursor.style.transform = 'translate(-50%, -50%) scale(1) rotate(0deg)';
                        cursor.style.borderRadius = '50%';
                    }, 120);
                }
            });
            
            // Touch event handlers for mobile
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    mouseX = touch.clientX;
                    mouseY = touch.clientY;
                    
                    cursor.style.left = mouseX + 'px';
                    cursor.style.top = mouseY + 'px';
                    
                    // Create trail on touch
                    const now = Date.now();
                    if (now - lastTrailTime > 50) {
                        createTrailDot(mouseX, mouseY);
                        lastTrailTime = now;
                    }
                    
                    updateButtonGlow(mouseX, mouseY);
                }
            }, { passive: true });
            
            document.addEventListener('touchstart', (e) => {
                cursor.style.opacity = '1';
                cursor.style.width = '50px';
                cursor.style.height = '50px';
            }, { passive: true });
            
            document.addEventListener('touchend', () => {
                cursor.style.opacity = '0';
            }, { passive: true });
            document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
            document.addEventListener('mouseenter', () => cursor.style.opacity = '1');

            // Bubble class
            class Bubble {
                constructor(x, y, size, parentVelocity = null) {
                    this.x = x;
                    this.y = y;
                    this.targetSize = size;
                    this.currentSize = size;
                    this.element = document.createElement('div');
                    this.element.className = 'bubble';
                    
                    // Random purple shade
                    const purpleVar = 160 + Math.random() * 60;
                    this.element.style.background = `rgba(${purpleVar}, ${purpleVar-40}, 255, 0.06)`;
                    
                    this.element.style.width = size + 'px';
                    this.element.style.height = size + 'px';
                    this.element.style.left = x + 'px';
                    this.element.style.top = y + 'px';
                    
                    // Add click handler for splitting
                    this.element.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.split();
                    });
                    
                    container.appendChild(this.element);
                    
                    // Velocity
                    if (parentVelocity) {
                        this.vx = parentVelocity.vx + (Math.random() - 0.5) * 0.8;
                        this.vy = parentVelocity.vy + (Math.random() - 0.5) * 0.8;
                    } else {
                        this.vx = (Math.random() - 0.5) * 1.2;
                        this.vy = (Math.random() - 0.5) * 1.2;
                    }
                    
                    // Bubble personality
                    this.floatAngle = Math.random() * Math.PI * 2;
                    this.floatSpeed = 0.2 + Math.random() * 0.3;
                    this.pulseSpeed = 0.3 + Math.random() * 0.4;
                    this.pulseOffset = Math.random() * Math.PI * 2;
                }
                
                split() {
                    if (this.targetSize < 30) return;
                    
                    createParticleExplosion(this.x, this.y, this.targetSize);
                    
                    const newSize = this.targetSize * 0.5;
                    
                    const bubble1 = new Bubble(
                        this.x - this.targetSize * 0.4,
                        this.y - this.targetSize * 0.3,
                        newSize,
                        { vx: this.vx - 1.0, vy: this.vy - 0.7 }
                    );
                    
                    const bubble2 = new Bubble(
                        this.x + this.targetSize * 0.4,
                        this.y + this.targetSize * 0.3,
                        newSize,
                        { vx: this.vx + 1.0, vy: this.vy + 0.7 }
                    );
                    
                    bubbles.push(bubble1, bubble2);
                    
                    this.element.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                    this.element.style.opacity = '0';
                    this.element.style.transform = 'translate(-50%, -50%) scale(0)';
                    setTimeout(() => this.remove(), 300);
                }
                
                remove() {
                    if (this.element && this.element.parentNode) {
                        this.element.remove();
                    }
                    const index = bubbles.indexOf(this);
                    if (index > -1) bubbles.splice(index, 1);
                }
                
                update() {
                    if (Math.random() < 0.3) {
                        const dx = this.x - mouseX;
                        const dy = this.y - mouseY;
                        const distToMouse = Math.hypot(dx, dy);
                        const influenceRadius = 150;

                        if (distToMouse < influenceRadius) {
                            const force = (1 - distToMouse / influenceRadius) * 1.2;
                            const angle = Math.atan2(dy, dx);
                            this.vx += Math.cos(angle) * force;
                            this.vy += Math.sin(angle) * force;
                        }
                    }

                    if (Math.random() < 0.15) {
                        this.floatAngle += 0.01;
                        this.vx += Math.cos(this.floatAngle) * 0.02;
                        this.vy += Math.sin(this.floatAngle) * 0.02;
                    }

                    this.vx *= 0.96;
                    this.vy *= 0.96;
                    
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    const margin = this.targetSize / 2;
                    if (this.x < margin) {
                        this.x = margin;
                        this.vx *= -0.6;
                    }
                    if (this.x > window.innerWidth - margin) {
                        this.x = window.innerWidth - margin;
                        this.vx *= -0.6;
                    }
                    if (this.y < margin) {
                        this.y = margin;
                        this.vy *= -0.6;
                    }
                    if (this.y > window.innerHeight - margin) {
                        this.y = window.innerHeight - margin;
                        this.vy *= -0.6;
                    }
                    
                    const pulse = 1 + Math.sin(Date.now() * 0.003 * this.pulseSpeed + this.pulseOffset) * 0.05;
                    
                    this.element.style.left = this.x + 'px';
                    this.element.style.top = this.y + 'px';
                    this.element.style.transform = `translate(-50%, -50%) scale(${pulse})`;
                }
            }

            // Star class for background
            class Star {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.size = 2 + Math.random() * 3;
                    this.opacity = 0.3 + Math.random() * 0.4;
                    this.flickerSpeed = 0.5 + Math.random() * 1;
                    this.flickerOffset = Math.random() * Math.PI * 2;
                    this.twinkle = Math.random() * Math.PI * 2;
                }
                
                update() {
                    this.twinkle += 0.02;
                    this.opacity = 0.3 + Math.sin(this.twinkle * this.flickerSpeed + this.flickerOffset) * 0.2;
                }
                
                draw(ctx) {
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                    gradient.addColorStop(0, `rgba(200, 160, 255, ${this.opacity})`);
                    gradient.addColorStop(0.5, `rgba(156, 80, 255, ${this.opacity * 0.8})`);
                    gradient.addColorStop(1, `rgba(110, 60, 230, 0)`);
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }

            // Initialize bubbles with mobile detection
            function initBubbles() {
                const mobile = window.innerWidth <= 600;
                
                if (mobile) {
                    const count = 6;
                    for (let i = 0; i < count; i++) {
                        const x = window.innerWidth * (0.1 + Math.random() * 0.8);
                        const y = window.innerHeight * (0.1 + Math.random() * 0.8);
                        const size = 30 + Math.random() * 40;
                        
                        const bubble = new Bubble(x, y, size);
                        bubbles.push(bubble);
                    }
                    
                    const starCount = 20;
                    for (let i = 0; i < starCount; i++) {
                        const x = Math.random() * window.innerWidth;
                        const y = Math.random() * window.innerHeight;
                        stars.push(new Star(x, y));
                    }
                } else {
                    const count = 20;
                    for (let i = 0; i < count; i++) {
                        const x = window.innerWidth * (0.1 + Math.random() * 0.8);
                        const y = window.innerHeight * (0.1 + Math.random() * 0.8);
                        const size = 40 + Math.random() * 60;
                        
                        const bubble = new Bubble(x, y, size);
                        bubbles.push(bubble);
                    }
                    
                    const starCount = 50;
                    for (let i = 0; i < starCount; i++) {
                        const x = Math.random() * window.innerWidth;
                        const y = Math.random() * window.innerHeight;
                        stars.push(new Star(x, y));
                    }
                }
            }

            // Draw connection lines
            function drawConnections() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                stars.forEach(star => {
                    star.update();
                    star.draw(ctx);
                });
                
                if (!isMobile()) {
                    const starConnectionDistance = 80;
                    for (let i = 0; i < stars.length; i++) {
                        for (let j = i + 1; j < stars.length; j++) {
                            const s1 = stars[i];
                            const s2 = stars[j];
                            const dx = s1.x - s2.x;
                            const dy = s1.y - s2.y;
                            const distance = Math.hypot(dx, dy);
                            
                            if (distance < starConnectionDistance) {
                                const opacity = (1 - distance / starConnectionDistance) * 0.1;
                                ctx.beginPath();
                                ctx.moveTo(s1.x, s1.y);
                                ctx.lineTo(s2.x, s2.y);
                                ctx.strokeStyle = `rgba(200, 160, 255, ${opacity})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }
                    
                    const connectionDistance = 150;
                    for (let i = 0; i < bubbles.length; i++) {
                        for (let j = i + 1; j < bubbles.length; j++) {
                            const b1 = bubbles[i];
                            const b2 = bubbles[j];
                            const dx = b1.x - b2.x;
                            const dy = b1.y - b2.y;
                            const distance = Math.hypot(dx, dy);

                            if (distance < connectionDistance) {
                                const opacity = (1 - distance / connectionDistance) * 0.15;
                                ctx.beginPath();
                                ctx.moveTo(b1.x, b1.y);
                                ctx.lineTo(b2.x, b2.y);
                                ctx.strokeStyle = `rgba(200, 160, 255, ${opacity})`;
                                ctx.lineWidth = 1.5;
                                ctx.stroke();
                            }
                        }
                    }
                }
            }

            // Resize handler
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            // Animation loop
            let lastTime = 0;
            const fps = 60;
            const interval = 1000 / fps;

            function animate(currentTime) {
                requestAnimationFrame(animate);
                
                if (currentTime - lastTime < interval) return;
                lastTime = currentTime;
                
                for (let i = bubbles.length - 1; i >= 0; i--) {
                    bubbles[i].update();
                }
                
                if (Math.random() < 0.005) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    stars.push(new Star(x, y));
                }
                
                drawConnections();
            }

            // Initialize
            window.addEventListener('resize', resize);
            resize();
            initBubbles();
            requestAnimationFrame(animate);

            // Button hover effects
            const buttons = document.querySelectorAll('.btn, .social-btn');
            buttons.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    cursor.style.width = '42px';
                    cursor.style.height = '42px';
                    cursor.style.background = 'rgba(220, 180, 255, 0.3)';
                });
                
                btn.addEventListener('mouseleave', () => {
                    cursor.style.width = '34px';
                    cursor.style.height = '34px';
                    cursor.style.background = 'rgba(200, 160, 255, 0.2)';
                });
            });
            
            // Subtle random letter flickering
            const nameElement = document.getElementById('flicker-name');
            const originalText = nameElement.textContent;
            
            nameElement.innerHTML = '';
            const letters = originalText.split('');
            const letterSpans = [];
            
            letters.forEach((letter, index) => {
                const span = document.createElement('span');
                span.className = 'flicker-letter';
                span.textContent = letter;
                span.dataset.index = index;
                nameElement.appendChild(span);
                letterSpans.push(span);
            });
            
            function randomFlicker() {
                const flickerCount = 1 + Math.floor(Math.random() * 2);
                const selectedIndices = [];
                
                for (let i = 0; i < flickerCount; i++) {
                    const randomIndex = Math.floor(Math.random() * letterSpans.length);
                    if (!selectedIndices.includes(randomIndex)) {
                        selectedIndices.push(randomIndex);
                    }
                }
                
                selectedIndices.forEach(index => {
                    const span = letterSpans[index];
                    
                    span.style.transition = 'text-shadow 1.5s ease, opacity 1.5s ease';
                    span.style.opacity = '0.7';
                    span.style.textShadow = '0 0 15px #c49bff, 0 0 30px #9f6eff';
                    
                    setTimeout(() => {
                        span.style.opacity = '1';
                        span.style.textShadow = '0 0 30px #c49bff, 0 0 60px #9f6eff';
                    }, 1500);
                });
                
                const nextFlicker = 3000 + Math.random() * 2000;
                setTimeout(randomFlicker, nextFlicker);
            }
            
            setTimeout(randomFlicker, 2000);

            // Menu functionality
            const menuButton = document.getElementById('menu-button');
            const menuDropdown = document.getElementById('menu-dropdown');
            const optimizeToggle = document.getElementById('optimize-toggle');

            menuButton.addEventListener('click', () => {
                menuDropdown.style.display = menuDropdown.style.display === 'block' ? 'none' : 'block';
            });

            optimizeToggle.addEventListener('change', (e) => {
                const isOn = e.target.checked;
                const bubbles = document.getElementById('bubbles-container');
                const cursor = document.getElementById('custom-cursor');
                if (bubbles) bubbles.style.display = isOn ? 'none' : 'block';
                if (cursor) cursor.style.display = isOn ? 'none' : 'block';
                document.body.style.cursor = isOn ? 'default' : 'none';
            });

            // Easter eggs
            const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
            let konamiIndex = 0;
            
            document.addEventListener('keydown', (e) => {
                if (e.key === konamiCode[konamiIndex]) {
                    konamiIndex++;
                    if (konamiIndex === konamiCode.length) {
                        triggerEasterEgg1();
                        konamiIndex = 0;
                    }
                } else {
                    konamiIndex = 0;
                }
                
                if (e.key === '`' || e.key === '~') {
                    triggerEasterEgg2();
                }
                
                if (e.key === '?' && e.shiftKey) {
                    triggerEasterEgg3();
                }
            });
            
            function triggerEasterEgg1() {
                const message = document.createElement('div');
                message.textContent = 'goddamn some one found it?';
                message.style.position = 'fixed';
                message.style.top = '50%';
                message.style.left = '50%';
                message.style.transform = 'translate(-50%, -50%)';
                message.style.fontSize = '32px';
                message.style.color = '#fff';
                message.style.textShadow = '0 0 20px #c49bff, 0 0 40px #9f6eff';
                message.style.zIndex = '9999';
                message.style.pointerEvents = 'none';
                document.body.appendChild(message);
                
                for (let i = 0; i < 50; i++) {
                    setTimeout(() => {
                        createParticleExplosion(
                            Math.random() * window.innerWidth,
                            Math.random() * window.innerHeight,
                            50
                        );
                    }, i * 50);
                }
                
                setTimeout(() => message.remove(), 3000);
            }
            
            function triggerEasterEgg2() {
                const isRainbow = document.body.style.filter;
                if (isRainbow) {
                    document.body.style.filter = '';
                } else {
                    document.body.style.filter = 'hue-rotate(360deg) saturate(1.5)';
                    let hue = 0;
                    setInterval(() => {
                        hue = (hue + 5) % 360;
                        document.body.style.filter = `hue-rotate(${hue}deg) saturate(1.5)`;
                    }, 50);
                }
            }
            
            function triggerEasterEgg3() {
                const help = document.createElement('div');
                help.style.position = 'fixed';
                help.style.top = '50%';
                help.style.left = '50%';
                help.style.transform = 'translate(-50%, -50%)';
                help.style.background = 'rgba(170, 120, 255, 0.2)';
                help.style.backdropFilter = 'blur(10px)';
                help.style.border = '2px solid rgba(200, 160, 255, 0.5)';
                help.style.borderRadius = '15px';
                help.style.padding = '30px';
                help.style.maxWidth = '500px';
                help.style.color = '#f8f0ff';
                help.style.zIndex = '9999';
                help.style.fontFamily = 'monospace';
                help.style.fontSize = '14px';
                help.innerHTML = `
                    <h2 style="margin-top: 0; color: #c49bff;">Shhhh</h2>
                    <p><strong>Arrow Keys + B + A:</strong>  particles</p>
                    <p><strong>Backtick (~):</strong>  rainbow mode</p>
                    <p><strong>Shift + ?:</strong> Show this help menu</p>
                    <br><p style="text-align: center; opacity: 0.7; margin: 0;">Press Escape to close</p>
                `;
                help.style.cursor = 'default';
                document.body.appendChild(help);
                
                const closeHelp = () => {
                    help.remove();
                    document.removeEventListener('keydown', escapeListener);
                };
                
                const escapeListener = (e) => {
                    if (e.key === 'Escape') closeHelp();
                };
                
                document.addEventListener('keydown', escapeListener);
                help.addEventListener('click', closeHelp);
            }

            // Subtle button wobble
            const wobbleBtns = document.querySelectorAll('.btn, .social-btn');
            let wobbleTime = 0;

            function buttonWobble() {
                wobbleTime += 0.02;
                
                wobbleBtns.forEach((btn, index) => {
                    const offset = index * 0.5;
                    const wobbleX = Math.sin(wobbleTime + offset) * 1.5;
                    const wobbleY = Math.cos(wobbleTime * 0.8 + offset) * 1;
                    const wobbleRotate = Math.sin(wobbleTime * 0.5 + offset) * 0.5;
                    
                    if (!btn.matches(':hover')) {
                        btn.style.transform = `translate(${wobbleX}px, ${wobbleY}px) rotate(${wobbleRotate}deg)`;
                    }
                });
                
                requestAnimationFrame(buttonWobble);
            }

            buttonWobble();
        })();
    </script>
</body>

</html>
