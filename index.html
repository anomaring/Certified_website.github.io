        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            position: relative;
            background: #0a0518;
        }

        /* Rich purple background */
        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #2d1b4e, #120b24 80%);
            z-index: -2;
        }

        .bg-blob {
            position: absolute;
            width: 80vmax; /* Reduced from 100vmax */
            height: 80vmax; /* Reduced from 100vmax */
            border-radius: 50%;
            filter: blur(60px); /* Reduced from 120px */
            z-index: -1;
            mix-blend-mode: soft-light;
            animation: drift 40s infinite alternate; /* Slower animation */
        }

        .blob-purple { background: rgba(156, 80, 255, 0.2); top: -30%; left: -20%; animation: drift 28s infinite alternate; }
        .blob-magenta { background: rgba(220, 70, 200, 0.15); bottom: -40%; right: -20%; animation: drift 32s infinite alternate-reverse; }
        .blob-indigo { background: rgba(110, 60, 230, 0.18); top: 40%; right: 30%; width: 80vmax; animation: drift 25s infinite alternate; }
        .blob-lavender { background: rgba(190, 140, 255, 0.12); bottom: 20%; left: 20%; width: 70vmax; animation: drift 30s infinite alternate-reverse; }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 8%) scale(1.15); }
        }

        /* Canvas for connection lines */
        #connection-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }

        /* Bubbles container */
        #bubbles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* BUBBLE */
        /* BUBBLE - PERFORMANCE OPTIMIZED */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(200, 160, 255, 0.06);
            backdrop-filter: blur(4px) saturate(150%); /* Reduced blur and saturate */
            -webkit-backdrop-filter: blur(4px) saturate(150%);
            border: 1px solid rgba(220, 180, 255, 0.2);
            box-shadow: 0 0 20px rgba(170, 120, 255, 0.15), /* Reduced shadows */
                        0 0 10px rgba(255, 255, 255, 0.08) inset,
                        -5px -5px 12px rgba(0, 0, 0, 0.08) inset,
                        5px 5px 12px rgba(255, 255, 255, 0.03) inset;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            will-change: transform, left, top;
            transition: box-shadow 0.15s; /* Reduced transition time */
            cursor: none;
        }

        .bubble:hover {
            box-shadow: 0 0 60px rgba(200, 150, 255, 0.4),
                        0 0 25px rgba(255, 255, 255, 0.2) inset,
                        -12px -12px 30px rgba(0, 0, 0, 0.2) inset;
        }

        .bubble::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 240, 255, 0.4) 0%, transparent 80%);
            filter: blur(4px);
        }

        /* bubble cursorrsa */
        #custom-cursor {
            position: fixed;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(200, 160, 255, 0.2);
            backdrop-filter: blur(12px) saturate(200%);
            -webkit-backdrop-filter: blur(12px) saturate(200%);
            border: 1.5px solid rgba(240, 210, 255, 0.5);
            box-shadow: 0 0 40px rgba(180, 130, 255, 0.7),
                        0 0 20px rgba(255, 255, 255, 0.5) inset,
                        6px 6px 12px rgba(0, 0, 0, 0.2),
                        -4px -4px 12px rgba(255, 255, 255, 0.1) inset;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            will-change: transform, left, top;
            transition: width 0.1s, height 0.1s, background 0.2s;
        }

        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            filter: blur(4px);
        }

        /* two main buttons */

        .btn::before {

        .btn:hover::before {

        .dot {

        .dot:nth-child(1) { top: 8px; left: 50%; transform: translateX(-50%); }

        .menu-dropdown {

            backdrop-filter: blur(8px) saturate(150%);

        .switch {

        .slider {

        .slider:before {

        input:checked + .slider {

        /* Mobile optimization (lmao loser phone user) */

            .social-btn { width: 44px; height: 44px; }
            .social-btn svg { width: 22px; height: 22px; }
            #custom-cursor { display: none; }

    <script>
        (function() {
            // Canvas for connection lines
            const canvas = document.getElementById('connection-canvas');
            const ctx = canvas.getContext('2d');
            
            // Cursor elements
            const cursor = document.getElementById('custom-cursor');
            const container = document.getElementById('bubbles-container'); 
            
            // Mouse position
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let lastMouseX = mouseX;
            let lastMouseY = mouseY;
            
            // Bubbles array
            let bubbles = [];
            
            // Track mouse movement for cursor wobble
            document.addEventListener('mousemove', (e) => {
                lastMouseX = mouseX;
                lastMouseY = mouseY;
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';
                
                // Wobble effect
                const speedX = mouseX - lastMouseX;
                const speedY = mouseY - lastMouseY;
                const speed = Math.hypot(speedX, speedY);
                
                if (speed > 2) {
                    const angle = Math.atan2(speedY, speedX);
                    const stretchX = 1 + Math.min(speed * 0.02, 0.4);
                    const stretchY = 1 - Math.min(speed * 0.01, 0.2);
                    
                    cursor.style.transform = `translate(-50%, -50%) rotate(${angle}rad) scale(${stretchX}, ${stretchY})`;
                    cursor.style.borderRadius = '40% 60% 50% 50% / 50% 40% 60% 50%';
                    
                    if (cursor.wobbleTimeout) clearTimeout(cursor.wobbleTimeout);
                    cursor.wobbleTimeout = setTimeout(() => {
                        cursor.style.transform = 'translate(-50%, -50%) scale(1) rotate(0deg)';
                        cursor.style.borderRadius = '50%';
                    }, 120);
                }
            });
            
            document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
            document.addEventListener('mouseenter', () => cursor.style.opacity = '1');

            // Bubble class
            class Bubble {
                constructor(x, y, size, parentVelocity = null) {
                    this.x = x;
                    this.y = y;
                    this.targetSize = size;
                    this.currentSize = size;
                    this.element = document.createElement('div');
                    this.element.className = 'bubble';
                    
                    // Random purple shade
                    const purpleVar = 160 + Math.random() * 60;
                    this.element.style.background = `rgba(${purpleVar}, ${purpleVar-40}, 255, 0.06)`;
                    
                    this.element.style.width = size + 'px';
                    this.element.style.height = size + 'px';
                    this.element.style.left = x + 'px';
                    this.element.style.top = y + 'px';
                    
                    // Add click handler for splitting
                    this.element.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.split();
                    });
                    
                    container.appendChild(this.element);
                    
                    // Velocity
                    if (parentVelocity) {
                        // Inherit parent velocity with some randomness
                        this.vx = parentVelocity.vx + (Math.random() - 0.5) * 0.8;
                        this.vy = parentVelocity.vy + (Math.random() - 0.5) * 0.8;
                    } else {
                        this.vx = (Math.random() - 0.5) * 1.2;
                        this.vy = (Math.random() - 0.5) * 1.2;
                    }
                    
                    // Bubble personality
                    this.floatAngle = Math.random() * Math.PI * 2;
                    this.floatSpeed = 0.2 + Math.random() * 0.3;
                    this.pulseSpeed = 0.3 + Math.random() * 0.4;
                    this.pulseOffset = Math.random() * Math.PI * 2;
                }
                
                split() {
                    // Only split if big enough
                    if (this.targetSize < 30) return;
                    
                    const newSize = this.targetSize * 0.6;
                    
                    // Create two new bubbles
                    const bubble1 = new Bubble(
                        this.x - this.targetSize * 0.3,
                        this.y - this.targetSize * 0.2,
                        newSize,
                        { vx: this.vx - 0.8, vy: this.vy - 0.5 }
                    );
                    
                    const bubble2 = new Bubble(
                        this.x + this.targetSize * 0.3,
                        this.y + this.targetSize * 0.2,
                        newSize,
                        { vx: this.vx + 0.8, vy: this.vy + 0.5 }
                    );
                    
                    bubbles.push(bubble1, bubble2);
                    
                    // Remove this bubble
                    this.remove();
                }
                
                remove() {
                    if (this.element && this.element.parentNode) {
                        this.element.remove();
                    }
                    const index = bubbles.indexOf(this);
                    if (index > -1) bubbles.splice(index, 1);
                }
                
                update() {
                    // Mouse avoidance - REDUCED FREQUENCY
                    if (Math.random() < 0.2) { // Only 20% of frames
                        const dx = this.x - mouseX;
                        const dy = this.y - mouseY;
                        const distToMouse = Math.hypot(dx, dy);
                        const influenceRadius = 120; // Smaller radius

                        if (distToMouse < influenceRadius) {
                            const force = (1 - distToMouse / influenceRadius) * 0.8; // Weaker force
                            const angle = Math.atan2(dy, dx);
                            this.vx += Math.cos(angle) * force;
                            this.vy += Math.sin(angle) * force;
                        }
                    }

                    // Gentle floating motion - REDUCED FREQUENCY
                    if (Math.random() < 0.1) { // Only 10% of frames
                        this.floatAngle += 0.005; // Slower
                        this.vx += Math.cos(this.floatAngle) * 0.01; // Weaker
                        this.vy += Math.sin(this.floatAngle) * 0.01;
                    }

                    // Damping - INCREASED
                    this.vx *= 0.98; // More damping for stability
                    this.vy *= 0.98;
                    
                    // Update position
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    // Bounce off edges with damping
                    const margin = this.targetSize / 2;
                    if (this.x < margin) {
                        this.x = margin;
                        this.vx *= -0.7;
                    }
                    if (this.x > window.innerWidth - margin) {
                        this.x = window.innerWidth - margin;
                        this.vx *= -0.7;
                    }
                    if (this.y < margin) {
                        this.y = margin;
                        this.vy *= -0.7;
                    }
                    if (this.y > window.innerHeight - margin) {
                        this.y = window.innerHeight - margin;
                        this.vy *= -0.7;
                    }
                    
                    // Pulse effect
                    const pulse = 1 + Math.sin(Date.now() * 0.003 * this.pulseSpeed + this.pulseOffset) * 0.03;
                    
                    // Update DOM
                    this.element.style.left = this.x + 'px';
                    this.element.style.top = this.y + 'px';
                    this.element.style.transform = `translate(-50%, -50%) scale(${pulse})`;
                }
            }

            // Initialize 8 bubbles - REDUCED FOR PERFORMANCE
            function initBubbles() {
                const count = 8; // Reduced from 15 to 8
                for (let i = 0; i < count; i++) {
                    const x = window.innerWidth * (0.1 + Math.random() * 0.8);
                    const y = window.innerHeight * (0.1 + Math.random() * 0.8);
                    const size = 40 + Math.random() * 60; // Smaller bubbles

                    const bubble = new Bubble(x, y, size);
                    bubbles.push(bubble);
                }
            }

            // Draw connection lines between nearby bubbles
            // Draw connection lines - SIMPLIFIED FOR PERFORMANCE
            function drawConnections() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const connectionDistance = 100; // Much smaller range

                // Only connect first few bubbles to reduce calculations
                for (let i = 0; i < Math.min(bubbles.length, 4); i++) { // Only first 4 bubbles
                    for (let j = i + 1; j < Math.min(bubbles.length, i + 2); j++) { // Max 1 connection each
                        const b1 = bubbles[i];
                        const b2 = bubbles[j];

                        const dx = b1.x - b2.x;
                        const dy = b1.y - b2.y;
                        const distance = Math.hypot(dx, dy);

                        if (distance < connectionDistance) {
                            const opacity = (1 - distance / connectionDistance) * 0.03; // Much more subtle

                            ctx.beginPath();
                            ctx.moveTo(b1.x, b1.y);
                            ctx.lineTo(b2.x, b2.y);
                            ctx.strokeStyle = `rgba(200, 160, 255, ${opacity})`;
                            ctx.lineWidth = 0.5; // Thinner
                            ctx.stroke();
                        }
                    }
                }
            }

            // Resize handler
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            // Animation loop
            function animate() {
                // Update all bubbles
                for (let i = bubbles.length - 1; i >= 0; i--) {
                    bubbles[i].update();
                }
                
                // Draw connections
                drawConnections();
                
                requestAnimationFrame(animate);
            }

            // Initialize
            window.addEventListener('resize', resize);
            resize();
            initBubbles();
            animate();

            // Button hover effects
            const buttons = document.querySelectorAll('.btn, .social-btn');
            buttons.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    cursor.style.width = '42px';
                    cursor.style.height = '42px';
                    cursor.style.background = 'rgba(220, 180, 255, 0.3)';
                });
                
                btn.addEventListener('mouseleave', () => {
                    cursor.style.width = '34px';
                    cursor.style.height = '34px';
                    cursor.style.background = 'rgba(200, 160, 255, 0.2)';
                });
            });
            
            // Subtle random letter flickering
            const nameElement = document.getElementById('flicker-name');
            const originalText = nameElement.textContent;
            
            // Wrap each letter in a span
            nameElement.innerHTML = '';
            const letters = originalText.split('');
            const letterSpans = [];
            
            letters.forEach((letter, index) => {
                const span = document.createElement('span');
                span.className = 'flicker-letter';
                span.textContent = letter;
                span.dataset.index = index;
                nameElement.appendChild(span);
                letterSpans.push(span);
            });
            
            // Random flicker function - very subtle and slow
            function randomFlicker() {
                // Randomly select 1-2 letters to flicker
                const flickerCount = 1 + Math.floor(Math.random() * 2);
                const selectedIndices = [];
                
                for (let i = 0; i < flickerCount; i++) {
                    const randomIndex = Math.floor(Math.random() * letterSpans.length);
                    if (!selectedIndices.includes(randomIndex)) {
                        selectedIndices.push(randomIndex);
                    }
                }
                
                // Apply subtle flicker to selected letters
                selectedIndices.forEach(index => {
                    const span = letterSpans[index];
                    
                    // Subtle opacity and glow reduction
                    span.style.transition = 'text-shadow 1.5s ease, opacity 1.5s ease';
                    span.style.opacity = '0.7';
                    span.style.textShadow = '0 0 15px #c49bff, 0 0 30px #9f6eff';
                    
                    // Slowly restore
                    setTimeout(() => {
                        span.style.opacity = '1';
                        span.style.textShadow = '0 0 30px #c49bff, 0 0 60px #9f6eff';
                    }, 1500);
                });
                
                // Schedule next flicker - very slow (3-5 seconds)
                const nextFlicker = 3000 + Math.random() * 2000;
                setTimeout(randomFlicker, nextFlicker);
            }
            
            // Start flicker effect after a delay
            setTimeout(randomFlicker, 2000);

            // Menu functionality
            const menuButton = document.getElementById('menu-button');
            const menuDropdown = document.getElementById('menu-dropdown');
            const optimizeToggle = document.getElementById('optimize-toggle');

            menuButton.addEventListener('click', () => {
                menuDropdown.style.display = menuDropdown.style.display === 'block' ? 'none' : 'block';
            });

            optimizeToggle.addEventListener('change', (e) => {
                const isOn = e.target.checked;
                const bubbles = document.getElementById('bubbles-container');
                const cursor = document.getElementById('custom-cursor');
                if (bubbles) bubbles.style.display = isOn ? 'none' : 'block';
                if (cursor) cursor.style.display = isOn ? 'none' : 'block';
                document.body.style.cursor = isOn ? 'default' : 'none';
            });
        })();
    </script>
</body>
</html>
