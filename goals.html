<!DOCTYPE html>
<html>
<head>
    <title>My goals - Certified_Balls</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        
        body { background: #0a0518; color: white; font-family: sans-serif; }
        .content { max-width: 600px; margin: 100px auto; text-align: center; }
        .back-btn { 
            position: fixed; top: 20px; left: 20px; 
            color: #c49bff; text-decoration: none; 
            border: 1px solid #c49bff; padding: 10px 20px; border-radius: 30px;
        }
        .back-btn:hover { background: #c49bff; color: black; }
        ul { list-style: none; padding: 0; }
        li { margin: 20px 0; padding: 15px; border: 1px solid #c49bff33; border-radius: 10px; }

        /* Menu styles */
        .menu-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 70;
        }

        .menu-button {
            position: relative;
            width: 40px;
            height: 40px;
            cursor: pointer;
            pointer-events: auto;
        }

        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(170, 120, 255, 0.2);
            backdrop-filter: blur(4px) saturate(150%);
            -webkit-backdrop-filter: blur(4px) saturate(150%);
            border: 1px solid rgba(200, 160, 255, 0.3);
            box-shadow: 0 0 10px rgba(170, 120, 255, 0.2);
        }

        .dot:nth-child(1) { top: 8px; left: 50%; transform: translateX(-50%); }
        .dot:nth-child(2) { top: 17px; left: 50%; transform: translateX(-50%); }
        .dot:nth-child(3) { top: 26px; left: 50%; transform: translateX(-50%); }

        .menu-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: rgba(170, 120, 255, 0.15);
            backdrop-filter: blur(8px) saturate(150%);
            -webkit-backdrop-filter: blur(8px) saturate(150%);
            border: 1px solid rgba(200, 160, 255, 0.3);
            border-radius: 10px;
            padding: 10px;
            display: none;
            min-width: 150px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #f8f0ff;
            font-size: 14px;
            font-weight: 500;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(200, 160, 255, 0.2);
            transition: 0.4s;
            border-radius: 20px;
            border: 1px solid rgba(200, 160, 255, 0.3);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background: rgba(255, 255, 255, 0.8);
            transition: 0.4s;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        input:checked + .slider {
            background: rgba(156, 80, 255, 0.4);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <a href="Certified_website.html" class="back-btn">← Back to Home</a>
    
    <!-- Menu button and dropdown -->
    <div class="menu-container">
        <div class="menu-button" id="menu-button">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="menu-dropdown" id="menu-dropdown">
            <div class="menu-item">
                <span>Optimize</span>
                <label class="switch">
                    <input type="checkbox" id="optimize-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>
    
    <div class="content">
        <h1>My Goals</h1>
        <ul>
            <li>Build a TARS robot</li>
            <li>finish learning python</li>
            <li>Learn more languages</li>
        </ul>
    </div>
</body>
<script>
    // Menu functionality
    const menuButton = document.getElementById('menu-button');
    const menuDropdown = document.getElementById('menu-dropdown');
    const optimizeToggle = document.getElementById('optimize-toggle');

    menuButton.addEventListener('click', () => {
        menuDropdown.style.display = menuDropdown.style.display === 'block' ? 'none' : 'block';
    });

    optimizeToggle.addEventListener('change', (e) => {
        // No bubbles or cursor to hide, but toggle is there for consistency
    });
</script>
</html>
